<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            color: #333;
        }
        .hero {
            background-color: #ffcccb;
            padding: 50px;
            text-align: center;
        }
        .button {
            background-color: #ff69b4;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #ff1493;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>You're Invited!</h1>
        <p>Join us for a beautiful wedding celebration.</p>
        <p>Date: June 25, 2026</p>
        <p>Time: 3:00 PM</p>
        <p>Location: The Grand Venue, 123 Celebration Lane</p>
        <a href="#" class="button">RSVP Now</a>
    </div>
</body>
</html>
